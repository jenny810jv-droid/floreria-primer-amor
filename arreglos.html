    const grid = document.getElementById('product-grid');
    
    arreglos.forEach((p, index) => {
        grid.innerHTML += `
            <div class="product-card">
                <div class="product-image">
                    <img src="img/${p.id}.jpg" alt="${p.nombre}">
                </div>
                <div class="product-info">
                    <p class="category">${p.cat}</p>
                    <h3>${p.nombre}</h3>
                    <p class="specs-text">Cantidad: <span class="flower-count">${p.cant}</span> ${p.flor}</p>
                    <p class="description">${p.desc}</p>
                    
                    <div class="size-options">
                        <button type="button" class="size-btn active" onclick="updateSize(this, 'grande', ${p.precio}, ${p.cant})">Grande</button>
                        <button type="button" class="size-btn" onclick="updateSize(this, 'pequeno', ${p.precio}, ${p.cant})">Pequeño</button>
                    </div>

                    <div class="card-footer">
                        <span class="price">$${p.precio.toLocaleString('es-CO')}</span>
                        <button class="btn-cart" onclick="addToCart('${p.nombre}', this)">Añadir</button>
                    </div>
                </div>
            </div>
        `;
    });

    function updateSize(btn, size, precioBase, cantBase) {
        const card = btn.closest('.product-card');
        
        // Manejo de botones activos
        card.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const priceDisplay = card.querySelector('.price');
        const countDisplay = card.querySelector('.flower-count');

        if (size === "pequeno") {
            const nuevoPrecio = Math.round(precioBase * 0.6 / 1000) * 1000;
            const nuevasFlores = Math.round(cantBase / 2);
            priceDisplay.innerText = "$" + nuevoPrecio.toLocaleString('es-CO');
            countDisplay.innerText = nuevasFlores;
            countDisplay.style.color = "#a10000"; 
        } else {
            priceDisplay.innerText = "$" + precioBase.toLocaleString('es-CO');
            countDisplay.innerText = cantBase;
            countDisplay.style.color = "inherit";
        }
        
    }
    
function addToCart(nombre, btn) {
        const card = btn.closest('.product-card');
        const precioTexto = card.querySelector('.price').innerText;
        const precio = parseInt(precioTexto.replace(/[^0-9]/g, ''));
        const tamano = card.querySelector('.size-btn.active').innerText;
        const imagen = card.querySelector('.product-image img').src;

        const producto = {
            nombre: nombre,
            precio: precio,
            tamano: tamano,
            imagen: imagen,
            cantidad: 1
        };

        let carrito = JSON.parse(localStorage.getItem('carrito')) || [];
        const existe = carrito.find(item => item.nombre === producto.nombre && item.tamano === producto.tamano);

        if (existe) {
            existe.cantidad++;
        } else {
            carrito.push(producto);
        }

        localStorage.setItem('carrito', JSON.stringify(carrito));
        actualizarContadorCarrito();

        const textoOriginal = btn.innerText;
        btn.innerText = "¡Añadido! ✓";
        btn.style.backgroundColor = "#25D366";
        
        setTimeout(() => {
            btn.innerText = textoOriginal;
            btn.style.backgroundColor = ""; 
        }, 1500);
    }

    function actualizarContadorCarrito() {
        const carrito = JSON.parse(localStorage.getItem('carrito')) || [];
        const total = carrito.reduce((acc, item) => acc + item.cantidad, 0);
        const badge = document.getElementById('cart-count');
        if(badge) badge.innerText = total;
    }

    actualizarContadorCarrito();
</script>
<script>
    // Esta función sincroniza el número del carrito al cargar cualquier página
    function actualizarContadorGlobal() {
        const carrito = JSON.parse(localStorage.getItem('carrito')) || [];
        // Sumamos todas las cantidades de los productos guardados
        const total = carrito.reduce((acc, item) => acc + item.cantidad, 0);
        const badge = document.getElementById('cart-count');
        
        if (badge) {
            badge.innerText = total;
        }
    }

    // Se ejecuta apenas abre la página
    actualizarContadorGlobal();
</script>
